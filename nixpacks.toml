# Railway build config. Root Directory must stay at the repo root (not
# `web`) so `web`'s `file:../matching` dependency (see CLAUDE.md) can
# actually see matching/ -- Railway's Root Directory setting scopes the
# whole build context, not just the working directory for these commands.
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm --prefix web ci"]

[phases.build]
cmds = ["npm --prefix web run build"]

[start]
cmd = "npm --prefix web run start"
